<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redi AR - Demo</title>
    <!-- A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        #ui-layer {
            position: fixed; z-index: 1000; inset: 0;
            background: #0b1e3d; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff8ec; text-align: center; padding: 20px;
        }
        
        button {
            padding: 15px 40px; font-size: 1.2rem; background: #f97362;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            margin-top: 20px; font-weight: bold; transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        #redi-img { width: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <img id="redi-img" src="redi_saluda.png" alt="Redi">
        <h1>¡Hola! Soy Redi</h1>
        <p>Apunta al libro para pescar</p>
        <button id="start-btn">¡VAMOS!</button>
    </div>

    <a-scene 
        id="ar-scene"
        mindar-image="imageTargetSrc: ./libro.mind; autoStart: false; uiScanning: no;" 
        embedded 
        renderer="colorManagement: true; antialias: true;"
        vr-mode-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-0">
            <!-- AQUÍ TUS MODELOS/OBJETOS -->
            <a-box color="red" scale="0.5 0.5 0.5" position="0 0 0"></a-box>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('start-btn');
            const uiLayer = document.getElementById('ui-layer');
            const sceneEl = document.querySelector('#ar-scene');
            const target0 = document.querySelector('#target-0');

            // Iniciar AR
            startBtn.addEventListener('click', () => {
                uiLayer.style.display = 'none';
                const mindarSystem = sceneEl.systems["mindar-image-system"];
                mindarSystem.start();
                console.log("Sistema AR iniciado");
            });

            // Feedback de tracking
            target0.addEventListener('targetFound', () => {
                console.log("¡Target detectado! Mostrando contenido...");
            });

            target0.addEventListener('targetLost', () => {
                console.log("Target perdido.");
            });
        });
    </script>
</body>
</html>
